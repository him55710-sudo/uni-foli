services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    container_name: polio-postgres
    environment:
      POSTGRES_DB: polio
      POSTGRES_USER: polio
      POSTGRES_PASSWORD: polio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polio -d polio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polio-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: polio-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
